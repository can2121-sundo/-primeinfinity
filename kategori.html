  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat') || 'all';
      const lang = currentLang || 'fr';
      const t = (typeof translations !== 'undefined' && translations[lang]) ? translations[lang] : translations['fr'];
      const products = getProductsByCategory(cat === 'beauty' ? 'all' : cat);

      const catAllLabel = { fr: 'Tous les produits', en: 'All Products', de: 'Alle Produkte', it: 'Tutti i prodotti', tr: 'Tüm ürünler' };
      const catLabel = {
        fr: { collagen: 'Collagène', vitamins: 'Vitamines', shots: 'Shots Collagène', cosmetics: 'Cosmétique', beauty: 'Beauté' },
        en: { collagen: 'Collagen', vitamins: 'Vitamins', shots: 'Collagen Shots', cosmetics: 'Cosmetics', beauty: 'Beauty' },
        de: { collagen: 'Kollagen', vitamins: 'Vitamine', shots: 'Kollagen-Shots', cosmetics: 'Kosmetik', beauty: 'Schönheit' },
        it: { collagen: 'Collagene', vitamins: 'Vitamine', shots: 'Shot di Collagene', cosmetics: 'Cosmetici', beauty: 'Bellezza' },
        tr: { collagen: 'Kolajen', vitamins: 'Vitaminler', shots: 'Kolajen Shot', cosmetics: 'Kozmetik', beauty: 'Güzellik' }
      };
      const countLabel = { fr: 'produit(s) trouvé(s)', en: 'product(s) found', de: 'Produkt(e) gefunden', it: 'prodotto/i trovato/i', tr: 'ürün bulundu' };

      const catName = cat === 'all'
        ? (catAllLabel[lang] || catAllLabel.fr)
        : ((catLabel[lang] || catLabel.fr)[cat] || cat);

      document.getElementById('category-header').innerHTML = `
        <h1>${catName}</h1>
        <p>${products.length} ${countLabel[lang] || countLabel.fr}</p>
      `;
      if (products.length === 0) {
        document.getElementById('category-products').innerHTML =
          `<div class="glass-card" style="grid-column:1/-1;padding:46px 30px;text-align:center;max-width:640px;margin:0 auto;">
             <div style="font-size:2rem;margin-bottom:12px;">✨</div>
             <p style="margin:0;opacity:.9;">${t.coming_soon_box || 'Notre première collection exclusive sera bientôt disponible.'}</p>
           </div>`;
      }
      else document.getElementById('category-products').innerHTML = products.map((product, index) => `
        <div class="product-card animate-on-scroll" data-delay="${0.1 + index * 0.1}">
          <div class="product-image">
            <img src="${product.images[0]}" alt="${getProductName(product, lang)}" loading="lazy">
          </div>
          <div class="product-info">
            <h3>${getProductName(product, lang)}</h3>
            <div class="product-price">${formatPrice(product.price)}</div>
            ${product.inStock !== false && (product.stock === undefined || product.stock > 0)
              ? `<div class="product-stock" style="font-size:0.75rem;font-weight:600;margin-bottom:4px;"><span class="stock-dot"></span>${t.in_stock || 'En stock'}</div>`
              : `<div style="color:#ff4444;font-size:0.75rem;font-weight:600;margin-bottom:4px;">${t.out_of_stock || '⚠️ Rupture de stock'}</div>`}
            <div class="product-stars">
              ${renderStars(product.rating)}
              <span class="product-reviews">(${product.reviews})</span>
            </div>
            <div class="product-actions">
              <a href="urun.html?id=${product.id}" class="btn-primary btn-sm">${t.buy_now || 'Acheter'}</a>
              <button class="btn-outline btn-sm" onclick="Cart.addItem({id:${product.id},name:'${getProductName(product, lang).replace(/'/g, "\\'")}',price:${product.price},image:'${product.images[0]}'})">${t.add_to_cart || 'Panier'}</button>
            </div>
          </div>
        </div>
      `).join('');
    })();
  </script>
