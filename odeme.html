      <ul class="nav-links">

        <li><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
        <li><a href="inscription.html" data-i18n="nav_register">Inscription</a></li>

      <div class="nav-right">

          <div class="lang-flags">

            <button class="lang-flag" data-lang="de" aria-label="Deutsch"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#000"/><path d="M0 8h24v8H0z" fill="#DD0000"/><path d="M0 16h24v8H0z" fill="#FFCE00"/></svg></button>
            <button class="lang-flag" data-lang="en" aria-label="English"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#012169"/><path d="M0 0l24 24M24 0L0 24" stroke="#FFF" stroke-width="4"/><path d="M0 0l24 24M24 0L0 24" stroke="#C8102E" stroke-width="2"/><path d="M12 0v24M0 12h24" stroke="#FFF" stroke-width="4"/><path d="M12 0v24M0 12h24" stroke="#C8102E" stroke-width="2"/></svg></button>
          </div>
        </div>
        <div class="nav-icons">
          <a href="#" aria-label="Search"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg></a>
          <a href="#" aria-label="Account"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg></a>
          <a href="sepet.html" aria-label="Cart" class="nav-cart"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" /></svg><span class="cart-badge">0</span></a>

        <div class="hamburger" aria-label="Menu"><span></span><span></span><span></span></div>

  <section class="checkout-section">
    <div class="container">
      <div id="checkout-content">
        <!-- Filled by JS -->
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col animate-on-scroll">
          <a href="index.html" class="logo"><img src="images/logo.png" alt="PrimeInfinity" class="logo-img"></a>
          <p data-i18n="footer_tagline">PrimeInfinity — Commerce international sans limites</p>
        </div>
        <div class="footer-col animate-on-scroll">
          <h4 data-i18n="footer_quicklinks">Liens rapides</h4>
          <a href="index.html" data-i18n="nav_home">Accueil</a>
          <a href="a-propos.html" data-i18n="nav_about">À Propos</a>
          <a href="contact.html" data-i18n="nav_contact">Contact</a>
        </div>
        <div class="footer-col animate-on-scroll">
          <h4 data-i18n="footer_service">Service Client</h4>
          <a href="#" data-i18n="footer_shipping">Livraison</a>
          <a href="#" data-i18n="footer_returns">Retours</a>
          <a href="#" data-i18n="footer_faq">FAQ</a>
        </div>
        <div class="footer-col animate-on-scroll">
          <h4 data-i18n="footer_newsletter_title">Newsletter</h4>
          <form class="footer-newsletter-form" onsubmit="return false;">
            <input type="email" data-i18n="newsletter_placeholder" placeholder="Votre adresse email" required>
            <button type="submit" data-i18n="footer_subscribe">S'inscrire</button>
          </form>
        </div>
      </div>
      <div class="footer-bottom">
        <div class="copyright" data-i18n="copyright">© 2026 PrimeInfinity. Tous droits réservés.</div>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/account.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function() {
      const items = Cart.getItems();
      const t = (typeof translations !== 'undefined' && translations[currentLang]) ? translations[currentLang] : translations['fr'];
      if (items.length === 0) {
        document.getElementById('checkout-content').innerHTML = `
          <div class="cart-empty">
            <h2>${t.cart_empty_title || 'Votre panier est vide'}</h2>
            <a href="index.html#best-sellers" class="btn-primary" style="display:inline-block;margin-top:16px;">${t.cart_continue || 'Continuer les achats'}</a>
          </div>
        `;
        return;
      }

      const subtotal = Cart.getTotal();
      const shipping = subtotal >= 50 ? 0 : 5.99;
      const total = subtotal + shipping;

      document.getElementById('checkout-content').innerHTML = `
        <div style="max-width:600px;margin:0 auto;">
          <div class="checkout-summary" style="position:static;">
            <h3 style="text-align:center;margin-bottom:24px;">${t.checkout_summary || 'Récapitulatif de la commande'}</h3>
            ${items.map(item => `
              <div class="checkout-item">
                <img src="${item.image}" alt="${item.name}">
                <div class="checkout-item-info">
                  <h4>${item.name}</h4>
                  <span>${item.qty} x €${item.price.toFixed(2)}</span>
                </div>
              </div>
            `).join('')}
            <div class="summary-row"><span>${t.cart_subtotal || 'Sous-total'}</span><span>€${subtotal.toFixed(2)}</span></div>
            <div class="summary-row"><span>${t.cart_shipping || 'Livraison'}</span><span>${shipping === 0 ? (t.cart_free || 'Gratuite') : '€' + shipping.toFixed(2)}</span></div>
            <div class="summary-row total"><span>${t.cart_total || 'Total'}</span><span>€${total.toFixed(2)}</span></div>
            <button class="btn-checkout" onclick="completeOrder()" style="margin-top:24px;">${t.confirm_order || 'Confirmer la commande'}</button>
          </div>
        </div>
      `;

      window.completeOrder = function() {
        const t2 = (typeof translations !== 'undefined' && translations[currentLang]) ? translations[currentLang] : translations['fr'];
        document.getElementById('checkout-content').innerHTML = `
          <div class="order-success">
            <h2>${t2.order_success_title || 'Merci pour votre commande !'}</h2>
            <p>${t2.order_success_desc || 'Votre commande a bien été reçue. Nous vous contacterons bientôt.'}</p>
            <a href="index.html" class="btn-primary" style="display:inline-block;">${t2.back_to_home || 'Retour à l\'accueil'}</a>
          </div>
        `;
      };
    })();
  </script>
</body>
</html>
